name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root
        run: npm ci

      - name: Build citizen app
        run: npm run build

      - name: Install dashboard
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Install server
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

